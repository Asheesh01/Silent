<div style="font-family:Arial,sans-serif; max-width:480px; margin:0 auto; background:#ffffff; border-radius:12px; overflow:hidden; border:1px solid #e0e0e0;">

  <!-- Header -->
  <div style="background:#1a1a2e; padding:28px; text-align:center;">
    <h2 style="margin:0; color:#ffffff; font-size:20px; font-weight:700;">Replora</h2>
    <p style="margin:6px 0 0 0; color:#8892a4; font-size:13px; letter-spacing:1px; text-transform:uppercase;">Password Reset</p>
  </div>

  <!-- Body -->
  <div style="padding:32px 28px; text-align:center; background:#f9f9f9;">
    <p style="margin:0 0 6px 0; font-size:15px; color:#333;">Hi there,</p>
    <p style="margin:0 0 24px 0; font-size:14px; color:#555; line-height:1.6;">
      Use the code below to reset your <strong>Replora</strong> password.
    </p>

    <!-- OTP Code -->
    <div style="display:inline-block; background:#ffffff; border:2px solid #1a1a2e;
                border-radius:10px; padding:18px 40px; margin-bottom:24px;">
      <p style="margin:0 0 4px 0; font-size:11px; color:#888; letter-spacing:2px; text-transform:uppercase;">Your Reset Code</p>
      <p style="margin:0; font-size:36px; font-weight:800; letter-spacing:8px; color:#1a1a2e; font-family:'Courier New',monospace;">
        {{reset_code}}
      </p>
    </div>

    <p style="margin:0; font-size:13px; color:#888;">
      This code expires in <strong style="color:#333;">10 minutes</strong>.
    </p>
  </div>

  <!-- Warning -->
  <div style="padding:14px 28px; background:#fffbf0; border-top:1px solid #f0e8cc;">
    <p style="margin:0; font-size:12px; color:#7a6a3a; text-align:center;">
      ⚠️ If you didn't request this, ignore this email. Your account is safe.
    </p>
  </div>

  <!-- Footer -->
  <div style="padding:16px; background:#1a1a2e; text-align:center;">
    <p style="margin:0; font-size:12px; color:#6c7a8d;">
      — The <strong style="color:#aab0bd;">{{app_name}}</strong> Team
    </p>
  </div>

</div>
